<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>營建法規刷題 113-114</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { -webkit-tap-highlight-color: transparent; }
  .option-btn.correct { background-color:#16a34a !important; color:#fff !important; border-color:#16a34a !important; }
  .option-btn.wrong { background-color:#dc2626 !important; color:#fff !important; border-color:#dc2626 !important; }
  .option-btn.disabled-other { opacity:0.5; }
  .scrollbar-hide::-webkit-scrollbar{display:none;}
  .scrollbar-hide{-ms-overflow-style:none;scrollbar-width:none;}
</style>
</head>
<body class="bg-slate-100 text-slate-800 min-h-screen flex flex-col">

<header class="bg-white shadow-sm sticky top-0 z-20 px-4 py-3 flex items-center justify-between">
  <h1 class="text-lg font-bold text-slate-800">營建法規刷題 <span class="text-sm text-slate-400">113-114年</span></h1>
  <div id="progressBadge" class="text-xs font-medium text-slate-500"></div>
</header>

<main id="mainArea" class="flex-1 overflow-y-auto px-3 py-4 pb-24 max-w-md w-full mx-auto"></main>

<nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 flex z-30 max-w-md mx-auto w-full shadow-[0_-2px_8px_rgba(0,0,0,0.06)]">
  <button id="navPractice" class="flex-1 py-3 flex flex-col items-center justify-center text-sm font-medium gap-0.5">
    <span>📝</span><span>開始刷題</span>
  </button>
  <button id="navReview" class="flex-1 py-3 flex flex-col items-center justify-center text-sm font-medium gap-0.5">
    <span>📕</span><span>錯題複習本</span>
  </button>
</nav>

<script>
const DATA_URL = encodeURI('(114-113)_questions.json');
const LS_WRONG_KEY = 'law_quiz_wrong_v1';
const LS_PROGRESS_KEY = 'law_quiz_progress_v1';

let ALL_QUESTIONS = [];
let currentIndex = 0;
let currentView = 'practice';
let shuffledOrder = [];

const mainArea = document.getElementById('mainArea');
const navPractice = document.getElementById('navPractice');
const navReview = document.getElementById('navReview');
const progressBadge = document.getElementById('progressBadge');

function loadWrongBook() {
  try { return JSON.parse(localStorage.getItem(LS_WRONG_KEY)) || {}; } catch(e) { return {}; }
}
function saveWrongBook(book) {
  localStorage.setItem(LS_WRONG_KEY, JSON.stringify(book));
}
function loadProgress() {
  try { return JSON.parse(localStorage.getItem(LS_PROGRESS_KEY)) || { index: 0 }; } catch(e) { return { index: 0 }; }
}
function saveProgress() {
  localStorage.setItem(LS_PROGRESS_KEY, JSON.stringify({ index: currentIndex }));
}

function setActiveNav(view) {
  currentView = view;
  navPractice.classList.toggle('text-blue-600', view === 'practice');
  navPractice.classList.toggle('text-slate-400', view !== 'practice');
  navReview.classList.toggle('text-blue-600', view === 'review');
  navReview.classList.toggle('text-slate-400', view !== 'review');
}

function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function isMultiAnswer(q) {
  return Array.isArray(q.correct_answer) && q.correct_answer.length > 1;
}

function renderPracticeCard(q, qIndexLabel) {
  const wrongBook = loadWrongBook();
  const isWrongBefore = !!wrongBook[q.id];

  const optionsHtml = q.options.map((opt, i) => {
    return `<button data-opt="${escapeHtml(opt)}" class="option-btn w-full text-left border border-slate-300 rounded-xl px-4 py-3 mb-2 bg-white active:scale-[0.98] transition text-sm leading-snug">
      <span class="font-semibold text-slate-400 mr-2">${String.fromCharCode(65+i)}.</span>${escapeHtml(opt)}
    </button>`;
  }).join('');

  mainArea.innerHTML = `
  <div class="bg-white rounded-2xl shadow p-4 mb-4">
    <div class="flex items-center justify-between mb-2">
      <span class="text-xs px-2 py-1 rounded-full bg-blue-50 text-blue-600 font-medium">${escapeHtml(q.id)}</span>
      <span class="text-xs text-slate-400">${qIndexLabel}</span>
    </div>
    ${isMultiAnswer(q) ? '<div class="mb-2 text-xs inline-block px-2 py-1 rounded-full bg-amber-100 text-amber-700 font-medium">⚠ 多重給分／一律給分疑義題</div>' : ''}
    ${isWrongBefore ? '<div class="mb-2 text-xs inline-block px-2 py-1 rounded-full bg-rose-100 text-rose-600 font-medium ml-1">📕 曾錯過</div>' : ''}
    <p class="text-base font-medium leading-relaxed mb-4 whitespace-pre-wrap">${escapeHtml(q.question)}</p>
    <div id="optionsWrap">${optionsHtml}</div>
    <div id="answerPanel" class="hidden mt-3"></div>
  </div>
  <div class="flex gap-2">
    <button id="prevBtn" class="flex-1 py-3 rounded-xl bg-slate-200 text-slate-600 font-medium text-sm">← 上一題</button>
    <button id="nextBtn" class="flex-1 py-3 rounded-xl bg-blue-600 text-white font-medium text-sm">下一題 →</button>
  </div>
  `;

  document.querySelectorAll('.option-btn').forEach(btn => {
    btn.addEventListener('click', () => handleAnswer(q, btn));
  });
  document.getElementById('prevBtn').addEventListener('click', () => {
    currentIndex = (currentIndex - 1 + shuffledOrder.length) % shuffledOrder.length;
    saveProgress();
    showPracticeQuestion();
  });
  document.getElementById('nextBtn').addEventListener('click', () => {
    currentIndex = (currentIndex + 1) % shuffledOrder.length;
    saveProgress();
    showPracticeQuestion();
  });
}

function handleAnswer(q, clickedBtn) {
  const selected = clickedBtn.getAttribute('data-opt');
  const correctSet = new Set((q.correct_answer || []).map(a => String(a)));
  const isCorrect = correctSet.has(selected);

  document.querySelectorAll('.option-btn').forEach(btn => {
    btn.disabled = true;
    const val = btn.getAttribute('data-opt');
    if (correctSet.has(val)) {
      btn.classList.add('correct');
    } else if (btn === clickedBtn) {
      btn.classList.add('wrong');
    } else {
      btn.classList.add('disabled-other');
    }
  });

  const wrongBook = loadWrongBook();
  if (!isCorrect) {
    wrongBook[q.id] = { ts: Date.now(), question: q };
    saveWrongBook(wrongBook);
  }

  const panel = document.getElementById('answerPanel');
  panel.classList.remove('hidden');
  panel.innerHTML = `
    <div class="rounded-xl p-3 mb-2 ${isCorrect ? 'bg-green-50 border border-green-200' : 'bg-red-50 border border-red-200'}">
      <p class="font-bold ${isCorrect ? 'text-green-700' : 'text-red-700'} mb-1">${isCorrect ? '✅ 答對了！' : '❌ 答錯了'}</p>
      <p class="text-sm text-slate-700">正確答案：<span class="font-semibold">${q.correct_answer.map(escapeHtml).join('、')}</span></p>
      <p class="text-xs text-slate-500 mt-1">${escapeHtml(q.answer_reason || '')}</p>
    </div>
    <div class="rounded-xl p-3 mb-2 bg-indigo-50 border border-indigo-200">
      <p class="text-xs font-bold text-indigo-700 mb-1">📖 法規條文</p>
      <p class="text-sm text-slate-700">${escapeHtml(q.law_article || '')}</p>
    </div>
    <div class="rounded-xl p-3 mb-2 bg-slate-50 border border-slate-200">
      <p class="text-xs font-bold text-slate-600 mb-1">💡 詳細解析</p>
      <p class="text-sm text-slate-700">${escapeHtml(q.explanation || '')}</p>
      <p class="text-xs text-slate-400 mt-2">分類：${escapeHtml(q.law_category || '')}</p>
    </div>
    <div class="rounded-xl p-3 bg-amber-50 border border-amber-200">
      <p class="text-xs font-bold text-amber-700 mb-1">🔁 易錯延伸對比</p>
      <p class="text-sm text-slate-700">${escapeHtml(q.extended_notes || '')}</p>
    </div>
  `;
}

function showPracticeQuestion() {
  const q = ALL_QUESTIONS.find(x => x.id === shuffledOrder[currentIndex]);
  progressBadge.textContent = `${currentIndex+1} / ${shuffledOrder.length}`;
  renderPracticeCard(q, `第 ${currentIndex+1} 題 / 共 ${shuffledOrder.length} 題`);
}

function renderPracticeView() {
  setActiveNav('practice');
  if (shuffledOrder.length === 0) {
    shuffledOrder = ALL_QUESTIONS.map(q => q.id);
  }
  showPracticeQuestion();
}

// ---------- Review Book ----------
function buildCategoryTree(items) {
  // items: array of {id, question_obj}; category path split by '/'
  const tree = {};
  items.forEach(({ id, q }) => {
    const path = (q.law_category || '未分類').split('/').map(s => s.trim()).filter(Boolean);
    let node = tree;
    path.forEach((seg, i) => {
      if (!node[seg]) node[seg] = { __children: {}, __items: [] };
      if (i === path.length - 1) node[seg].__items.push({ id, q });
      node = node[seg].__children;
    });
  });
  return tree;
}

function renderTreeNode(node, depth, pathKey) {
  let html = '';
  Object.keys(node).forEach(key => {
    const entry = node[key];
    const nodeId = `${pathKey}__${key}`.replace(/[^a-zA-Z0-9_一-鿿]/g, '_');
    const childCount = countAllItems(entry);
    html += `
    <div class="mb-1">
      <button class="tree-toggle w-full flex items-center justify-between text-left px-3 py-2 rounded-lg bg-white border border-slate-200 text-sm font-medium" data-target="${nodeId}" style="margin-left:${depth*8}px">
        <span>${depth===0?'📂':'📁'} ${escapeHtml(key)} <span class="text-slate-400 font-normal">(${childCount})</span></span>
        <span class="toggle-arrow text-slate-400">▾</span>
      </button>
      <div id="${nodeId}" class="hidden pl-2 mt-1">
        ${renderTreeNode(entry.__children, depth+1, nodeId)}
        ${entry.__items.map(it => renderWrongItem(it)).join('')}
      </div>
    </div>`;
  });
  return html;
}

function countAllItems(entry) {
  let count = entry.__items.length;
  Object.values(entry.__children).forEach(child => { count += countAllItems(child); });
  return count;
}

function renderWrongItem({ id, q }) {
  return `
  <div class="bg-slate-50 border border-slate-200 rounded-xl p-3 mb-2 ml-2">
    <div class="flex justify-between items-start mb-1">
      <span class="text-xs px-2 py-0.5 rounded-full bg-rose-100 text-rose-600 font-medium">${escapeHtml(id)}</span>
      <button class="remove-wrong-btn text-xs text-slate-400" data-id="${escapeHtml(id)}">移除 ✕</button>
    </div>
    <p class="text-sm font-medium mb-1 whitespace-pre-wrap">${escapeHtml(q.question)}</p>
    <p class="text-xs text-slate-600 mb-1">正確答案：<span class="font-semibold">${(q.correct_answer||[]).map(escapeHtml).join('、')}</span></p>
    <p class="text-xs text-indigo-600 mb-1">📖 ${escapeHtml(q.law_article || '')}</p>
    <p class="text-xs text-slate-500 mb-1">💡 ${escapeHtml(q.explanation || '')}</p>
    <p class="text-xs text-amber-600">🔁 ${escapeHtml(q.extended_notes || '')}</p>
  </div>`;
}

function renderReviewView() {
  setActiveNav('review');
  const wrongBook = loadWrongBook();
  const items = Object.keys(wrongBook).map(id => ({ id, q: wrongBook[id].question }));

  if (items.length === 0) {
    mainArea.innerHTML = `<div class="text-center text-slate-400 mt-20">
      <p class="text-4xl mb-2">🎉</p>
      <p>目前沒有錯題，繼續刷題累積複習本！</p>
    </div>`;
    return;
  }

  const tree = buildCategoryTree(items);
  mainArea.innerHTML = `
    <div class="flex items-center justify-between mb-3">
      <h2 class="font-bold text-slate-700">錯題複習本（共 ${items.length} 題）</h2>
      <button id="clearAllWrongBtn" class="text-xs text-rose-500">清空全部</button>
    </div>
    <div id="treeWrap">${renderTreeNode(tree, 0, 'root')}</div>
  `;

  document.querySelectorAll('.tree-toggle').forEach(btn => {
    btn.addEventListener('click', () => {
      const target = document.getElementById(btn.getAttribute('data-target'));
      const arrow = btn.querySelector('.toggle-arrow');
      target.classList.toggle('hidden');
      arrow.textContent = target.classList.contains('hidden') ? '▾' : '▴';
    });
  });
  document.querySelectorAll('.remove-wrong-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const id = btn.getAttribute('data-id');
      const book = loadWrongBook();
      delete book[id];
      saveWrongBook(book);
      renderReviewView();
    });
  });
  const clearBtn = document.getElementById('clearAllWrongBtn');
  if (clearBtn) {
    clearBtn.addEventListener('click', () => {
      if (confirm('確定要清空所有錯題紀錄嗎？')) {
        saveWrongBook({});
        renderReviewView();
      }
    });
  }
}

navPractice.addEventListener('click', renderPracticeView);
navReview.addEventListener('click', renderReviewView);

fetch(DATA_URL)
  .then(res => {
    if (!res.ok) throw new Error('題庫載入失敗：' + res.status);
    return res.json();
  })
  .then(data => {
    ALL_QUESTIONS = data;
    const progress = loadProgress();
    currentIndex = Math.min(progress.index || 0, ALL_QUESTIONS.length - 1);
    if (currentIndex < 0) currentIndex = 0;
    renderPracticeView();
  })
  .catch(err => {
    mainArea.innerHTML = `<div class="text-center text-rose-500 mt-20 px-4">
      <p class="text-3xl mb-2">⚠️</p>
      <p class="font-medium">${escapeHtml(err.message)}</p>
      <p class="text-xs text-slate-400 mt-2">請確認 (114-113)_questions.json 與 index.html 位於同一目錄，並以本機伺服器（非 file://）方式開啟。</p>
    </div>`;
  });
</script>
</body>
</html>
